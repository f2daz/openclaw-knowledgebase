<!DOCTYPE html>
<html lang="en" class="h-full" data-theme="stealth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link rel="manifest" href="/static/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Jarvis KB">
    <link rel="apple-touch-icon" href="/static/icon-180.png">
    <meta name="theme-color" content="#0f172a">
    <title>{% block title %}OpenClaw Knowledgebase{% endblock %}</title>
    
    <!-- Shared Theme System (load before content to prevent flash) -->
    <link rel="stylesheet" href="/static/themes.css">
    <script src="/static/theme-switcher.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        claw: {
                            50: '#ecfeff',
                            100: '#cffafe',
                            200: '#a5f3fc',
                            300: '#67e8f9',
                            400: '#22d3ee',
                            500: '#06b6d4',
                            600: '#0891b2',
                            700: '#0e7490',
                            800: '#155e75',
                            900: '#164e63',
                        }
                    }
                }
            }
        }
    </script>
    
    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    
    <!-- Alpine.js -->
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        /* ========================================
           Glass Classes (using theme CSS variables)
           ======================================== */
        .glass {
            position: relative;
            background: var(--glass-bg);
            backdrop-filter: blur(var(--glass-blur));
            -webkit-backdrop-filter: blur(var(--glass-blur));
            border: 1px solid var(--glass-border);
            transition: var(--theme-transition);
        }
        /* Inner gradient border - only visible when theme provides it */
        .glass::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            padding: 1px;
            background: var(--glass-inner-border);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }
        .glass-light {
            background: var(--glass-bg-light);
            backdrop-filter: blur(var(--glass-blur));
            -webkit-backdrop-filter: blur(var(--glass-blur));
            border: 1px solid var(--glass-border);
            transition: var(--theme-transition);
        }
        
        /* Strong Glass */
        .neon-glass {
            background: var(--glass-bg-strong);
            backdrop-filter: blur(var(--glass-blur-strong));
            -webkit-backdrop-filter: blur(var(--glass-blur-strong));
            border: 1px solid var(--glass-border);
            transition: var(--theme-transition);
        }
        
        /* Edge glow */
        .edge-cyan { box-shadow: inset 0 2px 0 0 rgba(6, 182, 212, 0.5); }
        .edge-purple { box-shadow: inset 0 2px 0 0 rgba(168, 85, 247, 0.5); }
        .edge-green { box-shadow: inset 0 2px 0 0 rgba(34, 197, 94, 0.5); }
        .edge-red { box-shadow: inset 0 2px 0 0 rgba(239, 68, 68, 0.5); }
        
        /* ========================================
           Glow Effects (using theme CSS variables)
           ======================================== */
        
        /* Button - Glass with Inner Gradient Border */
        .glow-btn {
            position: relative;
            border-radius: 14px !important;
            border: none;
            background: var(--glass-bg-light);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .glow-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            padding: 1px;
            background: var(--glass-inner-border);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }
        .glow-btn:hover {
            background: var(--glass-bg);
            transform: translateY(-1px);
        }
        /* All button variants */
        .glow-btn-purple,
        .glow-btn-red {
            position: relative;
            border-radius: 14px !important;
            border: none;
            overflow: hidden;
        }
        .glow-btn-purple::before,
        .glow-btn-red::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            padding: 1px;
            background: var(--glass-inner-border);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }
        .glow-btn-purple:hover,
        .glow-btn-red:hover {
            transform: translateY(-1px);
        }
        
        /* Card - Glass with theme variables */
        .glow-card {
            position: relative;
            border-radius: 24px;
            background: var(--glass-bg);
            backdrop-filter: blur(var(--glass-blur-strong));
            -webkit-backdrop-filter: blur(var(--glass-blur-strong));
            border: 1px solid var(--glass-border);
            overflow: hidden;
            box-shadow: var(--card-shadow);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .glow-card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            padding: 1px;
            background: var(--glass-inner-border);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }
        .glow-card:hover {
            transform: translateY(-2px);
            border-color: var(--glass-border-hover);
            box-shadow: var(--card-shadow-hover);
        }
        
        /* Color variants */
        .glow-card-cyan,
        .glow-card-purple {
            position: relative;
            border-radius: 24px;
            background: var(--glass-bg);
            backdrop-filter: blur(var(--glass-blur-strong));
            -webkit-backdrop-filter: blur(var(--glass-blur-strong));
            border: 1px solid var(--glass-border);
            overflow: hidden;
            box-shadow: var(--card-shadow);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .glow-card-cyan::before,
        .glow-card-purple::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            padding: 1px;
            background: var(--glass-inner-border);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }
        .glow-card-cyan:hover,
        .glow-card-purple:hover {
            transform: translateY(-2px);
            border-color: var(--glass-border-hover);
            box-shadow: var(--card-shadow-hover);
        }
        
        /* Dashboard color variants */
        .glow-card-selected,
        .glow-card-green,
        .glow-card-blue,
        .glow-card-orange,
        .glow-card-red,
        .glow-card-pink {
            background: var(--glass-bg-strong) !important;
        }
        .glow-card-selected::before {
            background: var(--glass-inner-border) !important;
        }
        
        /* Input Glow */
        .glow-input {
            border-radius: 8px;
            background: var(--input-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--input-border);
            transition: all 0.2s ease;
        }
        .glow-input:focus {
            background: var(--input-bg);
            border-color: var(--input-border-focus);
            box-shadow: 
                0 0 0 3px rgba(34, 211, 238, 0.1),
                0 0 calc(20px * var(--glow-intensity)) rgba(34, 211, 238, 0.15);
            outline: none;
        }
        
        /* Modal */
        .glow-modal {
            position: relative;
            border-radius: 28px;
            background: var(--glass-bg-strong);
            backdrop-filter: blur(var(--glass-blur-strong));
            -webkit-backdrop-filter: blur(var(--glass-blur-strong));
            border: 1px solid var(--glass-border);
            overflow: hidden;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.4);
        }
        .glow-modal::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            padding: 1.5px;
            background: var(--glass-inner-border);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }
        
        /* Tag Chip */
        .tag-chip {
            background: linear-gradient(135deg, rgba(6, 182, 212, 0.15), rgba(20, 184, 166, 0.2));
            border: 1px solid rgba(20, 184, 166, 0.4);
            box-shadow: 0 2px 8px rgba(6, 182, 212, 0.15), inset 0 1px 0 rgba(255,255,255,0.05);
            transition: all 0.2s ease;
        }
        .tag-chip:hover {
            background: linear-gradient(135deg, rgba(6, 182, 212, 0.25), rgba(20, 184, 166, 0.3));
            border-color: rgba(6, 182, 212, 0.5);
            transform: translateY(-1px);
        }
        
        /* Depth Button */
        .depth-btn {
            background: var(--glass-bg-light);
            border: 1px solid var(--glass-border);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .depth-btn:hover {
            background: var(--glass-bg);
            border-color: var(--glass-border-hover);
        }
        .depth-btn-selected {
            background: linear-gradient(135deg, rgba(6, 182, 212, 0.15), rgba(20, 184, 166, 0.2));
            border-color: rgba(6, 182, 212, 0.4);
            box-shadow: inset 0 0 20px rgba(6, 182, 212, 0.1);
        }
        
        /* Type Card */
        .type-card {
            background: var(--glass-bg-light);
            border: 1px solid var(--glass-border);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .type-card:hover {
            background: var(--glass-bg);
            border-color: var(--glass-border-hover);
        }
        .type-card-selected {
            background: linear-gradient(135deg, rgba(6, 182, 212, 0.08), rgba(20, 184, 166, 0.12));
            border-color: rgba(6, 182, 212, 0.3);
            box-shadow: 0 0 0 1px rgba(6, 182, 212, 0.1);
        }
        
        /* Animations */
        .htmx-request .htmx-indicator {
            display: inline-block;
        }
        .htmx-indicator {
            display: none;
        }
        
        @keyframes kb-pulse-glow {
            0%, 100% { box-shadow: 0 0 20px rgba(6, 182, 212, 0.3); }
            50% { box-shadow: 0 0 30px rgba(6, 182, 212, 0.5); }
        }
        .glow-pulse { animation: kb-pulse-glow 2s ease-in-out infinite; }
    </style>
</head>
<body class="h-full text-white"
      style="background: var(--bg-base); background-attachment: fixed; padding-top: env(safe-area-inset-top); padding-left: env(safe-area-inset-left); padding-right: env(safe-area-inset-right); padding-bottom: env(safe-area-inset-bottom);"
      x-data="{ 
          showAddModal: false,
          confirmModal: { show: false, title: '', message: '', onConfirm: null, confirmText: 'Confirm', cancelText: 'Cancel', danger: false }
      }"
      @keydown.escape="showAddModal = false; confirmModal.show = false"
      @close-modal.window="showAddModal = false">
    <script>
        // Initialize theme from localStorage (already done by theme-switcher.js inline)
        ThemeSwitcher.init();
    </script>
    <!-- Background Orbs (theme-driven) -->
    <div class="theme-bg-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
        <div class="orb orb-4"></div>
        <div class="orb orb-5"></div>
    </div>
    
    <div class="min-h-full flex flex-col md:flex-row relative z-20">
        <!-- Desktop Sidebar (hidden on mobile) -->
        <aside class="hidden md:flex w-64 glass border-r p-4 flex-col" style="border-color: var(--glass-border);">
            <!-- Logo -->
            <div class="flex items-center gap-3 mb-8">
                <div class="w-10 h-10 rounded-lg bg-gradient-to-br from-cyan-400 to-cyan-600 flex items-center justify-center glow-btn">
                    <i data-lucide="book-open" class="w-6 h-6 text-white"></i>
                </div>
                <div>
                    <h1 class="font-bold text-lg">Knowledgebase</h1>
                    <p class="text-xs text-gray-400">OpenClaw</p>
                </div>
            </div>
            
            <!-- Navigation -->
            <nav class="flex-1 space-y-2">
                <a href="/" class="flex items-center gap-3 px-4 py-2.5 rounded-lg transition-all
                    {% if request.url.path == '/' %}bg-cyan-500/20 text-cyan-400 glow-card-selected{% else %}text-gray-300 hover:bg-white/5 hover:text-cyan-400{% endif %}">
                    <i data-lucide="layout-dashboard" class="w-5 h-5"></i>
                    Dashboard
                </a>
                <a href="/search" class="flex items-center gap-3 px-4 py-2.5 rounded-lg transition-all
                    {% if request.url.path == '/search' %}bg-cyan-500/20 text-cyan-400 glow-card-selected{% else %}text-gray-300 hover:bg-white/5 hover:text-cyan-400{% endif %}">
                    <i data-lucide="search" class="w-5 h-5"></i>
                    Search
                </a>
                <a href="/sources" class="flex items-center gap-3 px-4 py-2.5 rounded-lg transition-all
                    {% if request.url.path == '/sources' %}bg-cyan-500/20 text-cyan-400 glow-card-selected{% else %}text-gray-300 hover:bg-white/5 hover:text-cyan-400{% endif %}">
                    <i data-lucide="database" class="w-5 h-5"></i>
                    Sources
                </a>
                <a href="/settings" class="flex items-center gap-3 px-4 py-2.5 rounded-lg transition-all
                    {% if request.url.path == '/settings' %}bg-cyan-500/20 text-cyan-400 glow-card-selected{% else %}text-gray-300 hover:bg-white/5 hover:text-cyan-400{% endif %}">
                    <i data-lucide="settings" class="w-5 h-5"></i>
                    Settings
                </a>
            </nav>
            
            <!-- Footer -->
            <div class="pt-4 border-t border-white/10 space-y-2">
                <div class="text-xs text-gray-400">
                    <span class="text-gray-500">Shortcuts:</span>
                    <kbd class="px-1 bg-white/5 rounded">/</kbd> search
                    <kbd class="px-1 bg-white/5 rounded ml-1">n</kbd> new
                </div>
                <div class="text-xs text-gray-500">
                    v0.2.0 • <a href="https://github.com/f2daz/openclaw-knowledgebase" target="_blank" class="hover:text-cyan-400">GitHub</a>
                </div>
            </div>
        </aside>
        
        <!-- Main Content -->
        <main class="flex-1 overflow-auto pb-20 md:pb-0">
            {% block content %}{% endblock %}
        </main>
        
        <!-- Mobile Bottom Navigation -->
        <nav class="md:hidden fixed bottom-0 left-0 right-0 glass border-t px-2 py-2 flex justify-around items-center z-50" style="border-color: var(--glass-border);">
            <a href="/" class="flex flex-col items-center gap-1 px-4 py-2 rounded-lg transition-all
                {% if request.url.path == '/' %}text-cyan-400{% else %}text-gray-400{% endif %}">
                <i data-lucide="layout-dashboard" class="w-5 h-5"></i>
                <span class="text-xs">Home</span>
            </a>
            <a href="/search" class="flex flex-col items-center gap-1 px-4 py-2 rounded-lg transition-all
                {% if request.url.path == '/search' %}text-cyan-400{% else %}text-gray-400{% endif %}">
                <i data-lucide="search" class="w-5 h-5"></i>
                <span class="text-xs">Search</span>
            </a>
            <button @click="showAddModal = true" class="flex flex-col items-center gap-1 px-4 py-2 rounded-lg bg-gradient-to-r from-cyan-500 to-cyan-600 text-white glow-btn">
                <i data-lucide="plus" class="w-5 h-5"></i>
                <span class="text-xs">Add</span>
            </button>
            <a href="/sources" class="flex flex-col items-center gap-1 px-4 py-2 rounded-lg transition-all
                {% if request.url.path == '/sources' %}text-cyan-400{% else %}text-gray-400{% endif %}">
                <i data-lucide="database" class="w-5 h-5"></i>
                <span class="text-xs">Sources</span>
            </a>
            <a href="/settings" class="flex flex-col items-center gap-1 px-4 py-2 rounded-lg transition-all
                {% if request.url.path == '/settings' %}text-cyan-400{% else %}text-gray-400{% endif %}">
                <i data-lucide="settings" class="w-5 h-5"></i>
                <span class="text-xs">Settings</span>
            </a>
        </nav>
    </div>
    
    <!-- Add Modal (loaded dynamically) -->
    <template x-if="showAddModal">
        <div x-init="htmx.ajax('GET', '/htmx/add-modal?v=' + Date.now(), '#modal-container')"
             id="modal-container"></div>
    </template>
    
    <!-- Job Progress Toast -->
    {% include "partials/job_toast.html" %}
    
    <!-- Toast Notification System -->
    <div id="toast-notifications" 
         x-data="toastSystem()"
         class="fixed bottom-4 right-4 z-[200] space-y-2 pointer-events-none"
         style="max-width: 400px;">
        <template x-for="toast in toasts" :key="toast.id">
            <div class="pointer-events-auto glass rounded-xl p-4 shadow-2xl border transition-all duration-300"
                 :class="{
                     'border-green-500/30': toast.type === 'success',
                     'border-red-500/30': toast.type === 'error',
                     'border-cyan-500/30': toast.type === 'info'
                 }"
                 :style="'box-shadow: inset 0 2px 0 0 ' + (toast.type === 'success' ? 'rgba(34,197,94,0.5)' : toast.type === 'error' ? 'rgba(239,68,68,0.5)' : 'rgba(6,182,212,0.5)')"
                 x-transition:enter="transition ease-out duration-300"
                 x-transition:enter-start="opacity-0 translate-x-8"
                 x-transition:enter-end="opacity-100 translate-x-0"
                 x-transition:leave="transition ease-in duration-200"
                 x-transition:leave-start="opacity-100 translate-x-0"
                 x-transition:leave-end="opacity-0 translate-x-8">
                <div class="flex items-start gap-3">
                    <!-- Icon -->
                    <div class="flex-shrink-0 w-5 h-5 mt-0.5">
                        <template x-if="toast.type === 'success'">
                            <svg class="w-5 h-5 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                            </svg>
                        </template>
                        <template x-if="toast.type === 'error'">
                            <svg class="w-5 h-5 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                            </svg>
                        </template>
                        <template x-if="toast.type === 'info'">
                            <svg class="w-5 h-5 text-cyan-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                            </svg>
                        </template>
                    </div>
                    <!-- Content -->
                    <div class="flex-1 min-w-0">
                        <p class="text-sm font-medium text-white" x-text="toast.title"></p>
                        <p class="text-xs text-gray-400 mt-0.5" x-show="toast.message" x-text="toast.message"></p>
                    </div>
                    <!-- Close -->
                    <button @click="removeToast(toast.id)" 
                            class="flex-shrink-0 p-1 rounded hover:bg-white/10 text-gray-500 hover:text-white transition-colors">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                        </svg>
                    </button>
                </div>
            </div>
        </template>
    </div>
    
    <script>
        // Toast Notification System
        function toastSystem() {
            return {
                toasts: [],
                nextId: 0,
                addToast(type, title, message, duration) {
                    duration = duration || 5000;
                    const id = this.nextId++;
                    this.toasts.push({ id, type, title, message });
                    if (duration > 0) {
                        setTimeout(() => this.removeToast(id), duration);
                    }
                },
                removeToast(id) {
                    this.toasts = this.toasts.filter(t => t.id !== id);
                }
            };
        }
        
        // Global toast function
        window.showToast = function(type, title, message, duration) {
            const el = document.getElementById('toast-notifications');
            if (el && el.__x) {
                el.__x.$data.addToast(type, title, message, duration);
            }
        };
    </script>
    
    <script>
        // Initialize Lucide icons
        lucide.createIcons();
        
        // Re-initialize after HTMX swaps
        document.body.addEventListener('htmx:afterSwap', function() {
            lucide.createIcons();
        });
        
        // Keyboard shortcuts
        document.addEventListener('keydown', function(e) {
            // Don't trigger if typing in input
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') {
                // Escape to blur input
                if (e.key === 'Escape') {
                    e.target.blur();
                }
                return;
            }
            
            // / or Ctrl+K = Focus search
            if (e.key === '/' || (e.ctrlKey && e.key === 'k')) {
                e.preventDefault();
                const searchInput = document.querySelector('input[name="q"]');
                if (searchInput) {
                    searchInput.focus();
                } else {
                    window.location.href = '/search';
                }
            }
            
            // n = New source (open modal)
            if (e.key === 'n' && !e.ctrlKey && !e.metaKey) {
                const body = document.body;
                if (body.__x && body.__x.$data) {
                    body.__x.$data.showAddModal = true;
                }
            }
            
            // g then s = Go to sources
            // g then d = Go to dashboard
            // g then h = Go to settings (h for help/settings)
        });
        
        // Help tooltip for keyboard shortcuts
        console.log('⌨️ Keyboard shortcuts: / = search, n = new source, Esc = close');
        
        // Job Toast System
        window.showJobToast = function(jobId, type, title) {
            // Create toast container if not exists
            let container = document.getElementById('job-toast-container');
            if (!container) {
                container = document.createElement('div');
                container.id = 'job-toast-container';
                container.className = 'fixed bottom-4 right-4 z-50 space-y-2';
                document.body.appendChild(container);
            }
            
            // Create toast element
            const toast = document.createElement('div');
            toast.id = `toast-${jobId}`;
            toast.className = 'glass rounded-lg p-4 min-w-80 shadow-2xl border border-white/10';
            toast.innerHTML = `
                <div class="flex items-center gap-3 mb-2">
                    <i data-lucide="loader-2" class="w-5 h-5 text-cyan-400 animate-spin toast-icon"></i>
                    <div class="flex-1">
                        <p class="font-medium text-white">${type === 'crawl' ? 'Crawling' : type === 'upload' ? 'Processing' : 'Working'}...</p>
                        <p class="text-xs text-gray-400 truncate max-w-64">${title || ''}</p>
                    </div>
                    <span class="text-xs text-gray-500 toast-progress">0%</span>
                </div>
                <div class="h-1.5 bg-black/30 rounded-full overflow-hidden">
                    <div class="h-full bg-gradient-to-r from-cyan-500 to-cyan-400 transition-all duration-300 toast-bar" style="width: 0%"></div>
                </div>
                <p class="text-xs text-gray-500 mt-2 truncate toast-current"></p>
            `;
            container.appendChild(toast);
            lucide.createIcons();
            
            // Poll job status
            const pollToast = () => {
                fetch(`/api/jobs/${jobId}`)
                    .then(r => r.json())
                    .then(job => {
                        const pct = job.total > 0 ? Math.round((job.progress / job.total) * 100) : 0;
                        toast.querySelector('.toast-progress').textContent = `${pct}%`;
                        toast.querySelector('.toast-bar').style.width = `${pct}%`;
                        toast.querySelector('.toast-current').textContent = job.current || '';
                        
                        if (job.status === 'completed') {
                            // Replace the icon element entirely (lucide doesn't re-process converted icons)
                            const iconEl = toast.querySelector('.toast-icon');
                            const newIcon = document.createElement('i');
                            newIcon.className = 'w-5 h-5 text-green-400 toast-icon';
                            newIcon.setAttribute('data-lucide', 'check-circle');
                            iconEl.replaceWith(newIcon);
                            toast.querySelector('.toast-progress').textContent = '✓';
                            toast.querySelector('.toast-bar').style.width = '100%';
                            toast.querySelector('.toast-bar').className = 'h-full bg-gradient-to-r from-green-500 to-green-400 transition-all duration-300 toast-bar';
                            lucide.createIcons();
                            setTimeout(() => { 
                                toast.remove(); 
                                if (window.location.pathname === '/sources') window.location.reload();
                            }, 3000);
                        } else if (job.status === 'error') {
                            // Replace the icon element entirely
                            const iconEl = toast.querySelector('.toast-icon');
                            const newIcon = document.createElement('i');
                            newIcon.className = 'w-5 h-5 text-red-400 toast-icon';
                            newIcon.setAttribute('data-lucide', 'x-circle');
                            iconEl.replaceWith(newIcon);
                            toast.querySelector('.toast-current').textContent = job.error || 'Error';
                            toast.querySelector('.toast-bar').className = 'h-full bg-gradient-to-r from-red-500 to-red-400 transition-all duration-300 toast-bar';
                            lucide.createIcons();
                            setTimeout(() => toast.remove(), 5000);
                        } else {
                            setTimeout(pollToast, 2000);
                        }
                    })
                    .catch(() => setTimeout(pollToast, 3000));
            };
            setTimeout(pollToast, 500);
        };
        
        // Global Confirm Function
        window.confirmAction = function(options) {
            return new Promise((resolve) => {
                const body = document.body;
                if (body.__x && body.__x.$data) {
                    body.__x.$data.confirmModal = {
                        show: true,
                        title: options.title || 'Confirm',
                        message: options.message || 'Are you sure?',
                        confirmText: options.confirmText || 'Confirm',
                        cancelText: options.cancelText || 'Cancel',
                        danger: options.danger || false,
                        onConfirm: () => {
                            body.__x.$data.confirmModal.show = false;
                            resolve(true);
                        },
                        onCancel: () => {
                            body.__x.$data.confirmModal.show = false;
                            resolve(false);
                        }
                    };
                }
            });
        };
    </script>
    
    <!-- Confirm Modal -->
    <div x-show="confirmModal.show" x-cloak
         class="fixed inset-0 z-[100] flex items-center justify-center p-4"
         x-transition:enter="transition ease-out duration-200"
         x-transition:enter-start="opacity-0"
         x-transition:enter-end="opacity-100"
         x-transition:leave="transition ease-in duration-150"
         x-transition:leave-start="opacity-100"
         x-transition:leave-end="opacity-0">
        
        <!-- Backdrop -->
        <div class="absolute inset-0 bg-black/70 backdrop-blur-sm" 
             @click="confirmModal.onCancel && confirmModal.onCancel()"></div>
        
        <!-- Modal -->
        <div class="relative w-full max-w-md glass rounded-2xl glow-modal overflow-hidden"
             x-transition:enter="transition ease-out duration-200"
             x-transition:enter-start="opacity-0 scale-95"
             x-transition:enter-end="opacity-100 scale-100">
            
            <!-- Header -->
            <div class="p-6 pb-4">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-lg flex items-center justify-center"
                         :class="confirmModal.danger ? 'bg-red-500/20' : 'bg-cyan-500/20'">
                        <template x-if="confirmModal.danger">
                            <svg class="w-5 h-5 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
                            </svg>
                        </template>
                        <template x-if="!confirmModal.danger">
                            <svg class="w-5 h-5 text-cyan-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                            </svg>
                        </template>
                    </div>
                    <h2 class="text-lg font-bold text-white" x-text="confirmModal.title"></h2>
                </div>
            </div>
            
            <!-- Content -->
            <div class="px-6 pb-6">
                <p class="text-gray-300" x-text="confirmModal.message"></p>
            </div>
            
            <!-- Actions -->
            <div class="px-6 pb-6 flex items-center justify-end gap-3">
                <button @click="confirmModal.onCancel && confirmModal.onCancel()"
                        class="px-4 py-2 rounded-lg bg-white/5 hover:bg-white/10 text-gray-300 hover:text-white transition-colors">
                    <span x-text="confirmModal.cancelText"></span>
                </button>
                <button @click="confirmModal.onConfirm && confirmModal.onConfirm()"
                        class="px-4 py-2 rounded-lg text-white font-medium transition-all"
                        :class="confirmModal.danger 
                            ? 'bg-gradient-to-r from-red-500 to-red-600 hover:from-red-600 hover:to-red-700 glow-btn-red' 
                            : 'bg-gradient-to-r from-cyan-500 to-cyan-600 hover:from-cyan-600 hover:to-cyan-700 glow-btn'">
                    <span x-text="confirmModal.confirmText"></span>
                </button>
            </div>
        </div>
    </div>
</body>
</html>
